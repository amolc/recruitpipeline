<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SolarSolutions — Recruitment Pipeline{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  {% block extra_head %}{% endblock %}
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary: #f59e0b;
      --color-bg: #0f172a;
      --color-bg-card: #1e293b;
      --color-bg-sidebar: #111b2e;
      --color-bg-col: #1a2438;
      --color-border: #334155;
      --color-text: #f1f5f9;
      --color-text-muted: #64748b;
      --color-hover: #1e293b;
      --radius: 10px;
      --sidebar-w: 220px;
      --header-h: 56px;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      font-size: 0.875rem;
    }
    a { text-decoration: none; color: inherit; }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: var(--sidebar-w); right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--color-border);
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(12px);
      z-index: 20;
    }
    .header-title { font-weight: 700; font-size: 1rem; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-right span { color: var(--color-text-muted); font-size: 0.8125rem; }
    .logout-btn {
      padding: 6px 14px;
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 500;
      color: var(--color-text-muted);
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
    }
    .logout-btn:hover { color: var(--color-text); border-color: var(--color-text-muted); }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100%;
      background: var(--color-bg-sidebar);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      z-index: 30;
    }
    .sidebar-logo {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--color-primary);
      border-bottom: 1px solid var(--color-border);
    }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-text-muted);
      transition: 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover {
      color: var(--color-text);
      background: var(--color-hover);
    }
    .sidebar-nav a.active {
      color: var(--color-primary);
      background: rgba(245,158,11,0.08);
      border-left-color: var(--color-primary);
    }
    .sidebar-nav .nav-icon {
      width: 20px;
      text-align: center;
      font-size: 1rem;
    }

    /* ── Main ── */
    .main {
      margin-left: var(--sidebar-w);
      padding-top: var(--header-h);
      min-height: 100vh;
    }
    .main-content {
      padding: 20px 24px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-logo">SolarSolutions</div>
    <nav class="sidebar-nav">
      <a href="{% url 'candidate_list' %}" class="{% if request.resolver_match.url_name == 'candidate_list' or request.resolver_match.url_name == 'candidate_detail' or request.resolver_match.url_name == 'candidate_edit' or request.resolver_match.url_name == 'candidate_create' %}active{% endif %}">
        <span class="nav-icon">▦</span> Candidates
      </a>
      <a href="{% url 'admin_board' %}" class="{% if request.resolver_match.url_name == 'admin_board' %}active{% endif %}">
        <span class="nav-icon">⬡</span> Board
      </a>
      <a href="{% url 'job_positions' %}" class="{% if request.resolver_match.url_name == 'job_positions' %}active{% endif %}">
        <span class="nav-icon">⚑</span> Job Positions
      </a>
      <a href="{% url 'panelist' %}" class="{% if request.resolver_match.url_name == 'panelist' %}active{% endif %}">
        <span class="nav-icon">⊕</span> Panelist
      </a>
      <a href="{% url 'screenings' %}" class="{% if request.resolver_match.url_name == 'screenings' %}active{% endif %}">
        <span class="nav-icon">◎</span> Screenings
      </a>
      <a href="{% url 'pipeline' %}" class="{% if request.resolver_match.url_name == 'pipeline' %}active{% endif %}">
        <span class="nav-icon">⚙</span> Pipeline
      </a>
    </nav>
  </div>

  <div class="header">
    <div class="header-title">{% block page_title %}Dashboard{% endblock %}</div>
    <div class="header-right">
      <span>{{ user.get_username }}</span>
      <a href="{% url 'admin_logout' %}" class="logout-btn">Sign Out</a>
    </div>
  </div>

  <div class="main">
    <div class="main-content">
      {% block content %}{% endblock %}
    </div>
  </div>

</body>
</html>
