{% extends 'adminpanel/base.html' %}

{% block title %}Edit {{ position.title }} — Job Positions{% endblock %}
{% block page_title %}Edit: {{ position.title }}{% endblock %}

{% block extra_head %}
<style>
  .form-card {
    background: var(--color-bg-card); border: 1px solid var(--color-border);
    border-radius: var(--radius); padding: 28px; max-width: 700px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; font-size: 0.875rem; font-family: inherit;
    color: var(--color-text); background: var(--color-bg-input, #334155);
    border: 1px solid var(--color-border); border-radius: 6px; outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--color-primary);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group-check { display: flex; align-items: center; gap: 8px; }
  .form-group-check input[type="checkbox"] { width: auto; }
  .actions-bar { margin-top: 24px; display: flex; gap: 10px; }
  .btn {
    padding: 10px 24px; font-size: 0.8125rem; font-weight: 600; font-family: inherit;
    border: none; border-radius: 6px; cursor: pointer; transition: 0.15s; text-decoration: none;
  }
  .btn-primary { background: var(--color-primary); color: #0f172a; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-cancel { background: transparent; color: var(--color-text-muted); border: 1px solid var(--color-border); }
  .btn-cancel:hover { color: var(--color-text); }
</style>
{% endblock %}

{% block content %}
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="title">Job Title</label>
      <input id="title" value="{{ position.title }}" disabled style="opacity:0.6;" />
    </div>
    <div class="form-group">
      <label for="description">Job Description</label>
      <textarea id="description" name="description" rows="4">{{ position.description }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="base_salary">Base Salary ($)</label>
        <input id="base_salary" name="base_salary" type="number" step="0.01" min="0"
          value="{{ position.base_salary|default:'' }}" placeholder="e.g. 75000" />
      </div>
      <div class="form-group">
        <label for="hourly_rate">Per Hour ($)</label>
        <input id="hourly_rate" name="hourly_rate" type="number" step="0.01" min="0"
          value="{{ position.hourly_rate|default:'' }}" placeholder="e.g. 35.00" />
      </div>
    </div>
    <div class="form-group">
      <label for="location">Location</label>
      <input id="location" name="location" type="text" value="{{ position.location }}" placeholder="e.g. Austin, TX" />
    </div>
    <div class="form-group">
      <label for="requirements">Requirements</label>
      <textarea id="requirements" name="requirements" rows="4">{{ position.requirements }}</textarea>
    </div>
    <div class="form-group form-group-check">
      <input id="is_active" name="is_active" type="checkbox" {% if position.is_active %}checked{% endif %} />
      <label for="is_active" style="margin:0;">Active</label>
    </div>
    <div class="actions-bar">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'job_position_detail' position.pk %}" class="btn btn-cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
