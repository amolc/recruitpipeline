<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruitme — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #059669;
      --color-primary-dark: #047857;
      --color-bg: #f8fafc;
      --color-bg-card: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-md);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: var(--color-text);
      display: block;
      text-align: center;
      margin-bottom: 24px;
    }

    .logo span { color: var(--color-primary); }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--color-text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: 0.15s;
      background: none;
      font-family: inherit;
    }

    .tab:hover { color: var(--color-text); }
    .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 13px;
      font-size: 0.9375rem;
      font-family: inherit;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xs);
      outline: none;
      transition: border-color 0.2s;
      background: var(--color-bg-card);
      color: var(--color-text);
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(5,150,105,0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-xs);
      cursor: pointer;
      background: var(--color-primary);
      color: #fff;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-submit:hover { background: var(--color-primary-dark); }
    .btn-submit:active { transform: scale(0.98); }

    .msg {
      padding: 11px 15px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .msg-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--color-text); }
  </style>
</head>
<body>
  <div class="card">
    <a href="{% url 'landing' %}" class="logo">recruit<span>me</span></a>

    {% if error %}
      <div class="msg msg-error">{{ error }}</div>
    {% endif %}
    {% if messages %}
      {% for m in messages %}
        <div class="msg msg-{{ m.tags }}">{{ m }}</div>
      {% endfor %}
    {% endif %}

    <div class="tabs">
      <button class="tab active" onclick="switchTab('signin')" id="tabSignin">Sign In</button>
      <button class="tab" onclick="switchTab('register')" id="tabRegister">Register</button>
    </div>

    <form id="formSignin" class="tab-content active" method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="hidden" name="action" value="login" />
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" placeholder="+919876543210" autocomplete="tel" />
      </div>
      <div class="form-group">
        <label for="pin">PIN</label>
        <input id="pin" name="pin" type="password" placeholder="4-digit PIN" autocomplete="off" />
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <form id="formRegister" class="tab-content" method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <input type="hidden" name="action" value="register" />
      <div class="form-group">
        <label for="reg_name">Name</label>
        <input id="reg_name" name="name" type="text" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label for="reg_phone">Phone Number</label>
        <input id="reg_phone" name="phone" type="tel" placeholder="+919876543210" />
      </div>
      <div class="form-group">
        <label for="reg_pin">PIN</label>
        <input id="reg_pin" name="pin" type="password" placeholder="4-digit PIN" />
      </div>
      <div class="form-group">
        <label for="role_type">I am a</label>
        <select id="role_type" name="role_type">
          <option value="candidate" selected>Candidate — looking for jobs</option>
          <option value="recruiter">Recruiter — hiring for my company</option>
        </select>
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <a href="{% url 'landing' %}" class="back-link">&larr; Back to home</a>
  </div>

  <script>
    function switchTab(name) {
      document.getElementById('tabSignin').classList.toggle('active', name === 'signin');
      document.getElementById('tabRegister').classList.toggle('active', name === 'register');
      document.getElementById('formSignin').classList.toggle('active', name === 'signin');
      document.getElementById('formRegister').classList.toggle('active', name === 'register');
    }
  </script>
</body>
</html>
