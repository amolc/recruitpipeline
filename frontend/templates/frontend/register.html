<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruitme — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #059669;
      --color-primary-dark: #047857;
      --color-bg: #f8fafc;
      --color-bg-card: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-md);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: var(--color-text);
      display: block;
      text-align: center;
      margin-bottom: 8px;
    }

    .logo span { color: var(--color-primary); }

    .subtitle {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 11px 13px;
      font-size: 0.9375rem;
      font-family: inherit;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xs);
      outline: none;
      transition: border-color 0.2s;
      background: var(--color-bg-card);
      color: var(--color-text);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(5,150,105,0.1);
    }

    .form-group textarea { resize: vertical; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-xs);
      cursor: pointer;
      background: var(--color-primary);
      color: #fff;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-submit:hover { background: var(--color-primary-dark); }
    .btn-submit:active { transform: scale(0.98); }

    .msg {
      padding: 11px 15px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 16px;
      text-align: center;
    }

    .msg-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .msg-success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8125rem;
      color: var(--color-text-muted);
    }

    .footer-links a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <a href="{% url 'landing' %}" class="logo">recruit<span>me</span></a>
    <p class="subtitle">Register your company to get started</p>

    {% if messages %}
      {% for m in messages %}
        <div class="msg msg-{{ m.tags }}">{{ m }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'register_company' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="phone">Mobile Number *</label>
        <input id="phone" name="phone" type="tel" placeholder="+919876543210" required />
      </div>
      <div class="form-group">
        <label for="name">Company Name *</label>
        <input id="name" name="name" type="text" placeholder="e.g. Acme Corp" required />
      </div>
      <div class="form-group">
        <label for="address">Address <span style="font-weight:400;color:var(--color-text-muted);">(optional)</span></label>
        <textarea id="address" name="address" rows="2" placeholder="Street, city, state, zip"></textarea>
      </div>
      <button type="submit" class="btn-submit">Register Company</button>
    </form>

    <div class="footer-links">
      Already have an account? <a href="{% url 'landing' %}">Sign in</a>
    </div>
  </div>
</body>
</html>
