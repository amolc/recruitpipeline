<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — RecruitPanel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #059669;
      --primary-dark: #047857;
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .logo span { color: var(--primary); }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      font-size: 0.9375rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(5,150,105,0.1); }
    .form-group textarea { resize: vertical; font-size: 0.875rem; }
    .error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      margin-bottom: 18px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--primary-dark); }
    .footer-link { text-align: center; margin-top: 16px; }
    .footer-link a {
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .footer-link a:hover { color: var(--primary); }
    .pin-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">recruit<span>me</span></div>
    <div class="subtitle">Register your company</div>
    {% if messages %}
      {% for m in messages %}
        <div class="error">{{ m }}</div>
      {% endfor %}
    {% endif %}
    <form method="post" action="{% url 'recruitpanel:register' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="phone">Mobile Number</label>
        <input id="phone" name="phone" type="tel" placeholder="+919876543210" required />
      </div>
      <div class="form-group">
        <label for="name">Company Name</label>
        <input id="name" name="name" type="text" placeholder="e.g. Acme Corp" required />
      </div>
      <div class="form-group">
        <label for="address">Address <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
        <textarea id="address" name="address" rows="2" placeholder="Street, city, state, zip"></textarea>
      </div>
      <button type="submit" class="btn">Register &amp; Login</button>
    </form>
    <p class="pin-note">Your login PIN will be the last 4 digits of your phone number.</p>
    <div class="footer-link"><a href="{% url 'recruitpanel:recruitpanel_login' %}">Already registered? Log in</a></div>
  </div>
</body>
</html>
