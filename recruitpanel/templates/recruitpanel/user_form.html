{% extends 'recruitpanel/base.html' %}

{% block title %}Add User — {{ company.name }}{% endblock %}
{% block page_title %}Add User{% endblock %}

{% block extra_head %}
<style>
  .form-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; max-width: 500px;
    box-shadow: var(--shadow);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 5px; }
  .actions-bar { margin-top: 24px; display: flex; gap: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="phone">Mobile Number *</label>
      <input id="phone" name="phone" type="tel" placeholder="+919876543210" required />
      <div class="form-hint" style="font-size:0.6875rem;color:var(--text-muted);margin-top:3px;">Last 4 digits will be their login PIN.</div>
    </div>
    <div class="form-group">
      <label for="name">Name *</label>
      <input id="name" name="name" type="text" placeholder="e.g. John Doe" required />
    </div>
    <div class="form-group">
      <label for="sub_role">Role</label>
      <select id="sub_role" name="sub_role">
        <option value="admin">Admin</option>
        <option value="recruiter" selected>Recruiter</option>
        <option value="hiring_manager">Hiring Manager</option>
        <option value="viewer">Viewer</option>
      </select>
    </div>
    <div class="actions-bar">
      <button type="submit" class="btn btn-primary">Create User</button>
      <a href="{% url 'recruitpanel:user_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
