<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruitme — Super Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #059669;
      --primary-dark: #047857;
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    .logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .logo span { color: var(--primary); }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      font-size: 0.9375rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(5,150,105,0.1); }
    .error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      margin-bottom: 18px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--primary-dark); }
    .forgot { text-align: center; margin-top: 16px; }
    .forgot a {
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .forgot a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">recruit<span>me</span></div>
    <div class="subtitle">Super Admin Login</div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="text" placeholder="+919876543210" required />
      </div>
      <div class="form-group">
        <label for="pin">4-Digit PIN</label>
        <input id="pin" name="pin" type="password" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="****" required />
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="forgot">
      <a href="#">Forgot PIN?</a>
    </div>
  </div>
</body>
</html>
